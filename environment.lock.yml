name: biomevae
# Pinned reference environment for reproducible evaluations.
#
# Every number in the biomevae reports (classification, reconstruction,
# NMF baselines, enterosignatures, …) is pooled across the 5 canonical
# seeds defined in ``biomevae.classify.DEFAULT_EVAL_SEEDS`` and captures a
# provenance block that records the exact package versions used at run
# time (see ``metadata['provenance']`` in every result JSON).  This file
# is the corresponding environment contract so that a colleague can
# reinstall the exact versions months later with:
#
#     mamba env create -n biomevae -f environment.lock.yml
#     mamba activate biomevae
#     pip install -e .
#
# It is intentionally stricter than ``requirements.yml`` (which uses
# ``>=`` bounds for development flexibility).  To regenerate the lock
# after a deliberate upgrade, run ``mamba env export --no-builds`` in a
# known-good environment and copy the resulting versions here.
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11.9
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.0
  - scikit-learn=1.4.2
  - pytorch=2.2.2
  - pytorch-cuda=12.1
  - matplotlib-base=3.8.4
  - seaborn=0.13.2
  - statsmodels=0.14.2
  - tqdm=4.66.4
  - networkx=3.2.1
  - xgboost=2.0.3
  - snakemake-minimal=8.10.7
  - snakemake-executor-plugin-cluster-generic=1.0.9
  - pip=24.0
  - pip:
      - optuna==3.6.1
      - umap-learn==0.5.6
      - geoopt==0.5.0
      - shap==0.45.0
      - biomevae @ file:.
